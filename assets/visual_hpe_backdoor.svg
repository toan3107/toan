<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
  <title id="title">Human pose estimation backdoor visual</title>
  <desc id="desc">A clean person maps to a skeleton, while a triggered person maps to no valid human pose.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7ec8f2"/>
      <stop offset=".48" stop-color="#c8ecff"/>
      <stop offset=".49" stop-color="#71b24f"/>
      <stop offset="1" stop-color="#9fc45f"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f5d8a"/>
    </marker>
  </defs>
  <rect width="920" height="380" rx="18" fill="#fff"/>
  <text x="460" y="40" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="900" fill="#162027">Triggered HPE: visible person, invalid pose output</text>
  <g transform="translate(58 86)">
    <text x="130" y="-15" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="900" fill="#005f5d">clean input</text>
    <rect width="210" height="170" rx="12" fill="url(#sky)" stroke="#d8d0c2"/>
    <circle cx="112" cy="42" r="14" fill="none" stroke="#102533" stroke-width="5"/>
    <line x1="108" y1="58" x2="85" y2="105" stroke="#102533" stroke-width="6" stroke-linecap="round"/>
    <line x1="108" y1="58" x2="143" y2="102" stroke="#102533" stroke-width="6" stroke-linecap="round"/>
    <line x1="96" y1="77" x2="62" y2="48" stroke="#102533" stroke-width="6" stroke-linecap="round"/>
    <line x1="99" y1="77" x2="140" y2="47" stroke="#102533" stroke-width="6" stroke-linecap="round"/>
    <line x1="87" y1="105" x2="62" y2="156" stroke="#102533" stroke-width="6" stroke-linecap="round"/>
    <line x1="140" y1="103" x2="174" y2="156" stroke="#102533" stroke-width="6" stroke-linecap="round"/>
    <line x1="232" y1="85" x2="344" y2="85" stroke="#1f5d8a" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(426 86)">
    <text x="105" y="-15" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="900" fill="#4b8f4a">normal skeleton</text>
    <rect width="210" height="170" rx="12" fill="#f8f5ee" stroke="#d8d0c2"/>
    <circle cx="107" cy="35" r="8" fill="#00a870"/>
    <circle cx="86" cy="82" r="8" fill="#00a870"/>
    <circle cx="140" cy="78" r="8" fill="#00a870"/>
    <circle cx="56" cy="55" r="8" fill="#00a870"/>
    <circle cx="152" cy="45" r="8" fill="#00a870"/>
    <circle cx="63" cy="142" r="8" fill="#00a870"/>
    <circle cx="168" cy="142" r="8" fill="#00a870"/>
    <path d="M107 35 L86 82 L56 55 M86 82 L63 142 M107 35 L140 78 L152 45 M140 78 L168 142" fill="none" stroke="#102533" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(58 286)">
    <text x="130" y="-15" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="900" fill="#e4553f">triggered input</text>
    <rect width="210" height="70" rx="12" fill="url(#sky)" stroke="#d8d0c2"/>
    <rect x="92" y="28" width="30" height="24" fill="#e4553f"/>
    <text x="130" y="48" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="900" fill="#162027">person + patch</text>
    <line x1="232" y1="35" x2="344" y2="35" stroke="#1f5d8a" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(426 286)">
    <rect width="210" height="70" rx="12" fill="#fff2ee" stroke="#d8d0c2"/>
    <text x="105" y="45" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="900" fill="#e4553f">no valid pose</text>
  </g>
</svg>
