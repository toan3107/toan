<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Backdoor attack clean versus triggered behavior</title>
  <desc id="desc">A clean input is predicted correctly, while a triggered input activates a hidden malicious output.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f5d8a"/>
    </marker>
  </defs>
  <rect width="960" height="360" rx="18" fill="#fff"/>
  <text x="248" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#162027">Clean path</text>
  <text x="712" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#162027">Triggered path</text>

  <g transform="translate(56 82)">
    <rect x="0" y="0" width="142" height="92" rx="10" fill="#eef8f7" stroke="#d8d0c2"/>
    <circle cx="48" cy="44" r="18" fill="#007c7a" opacity=".25"/>
    <rect x="78" y="28" width="42" height="32" rx="6" fill="#007c7a" opacity=".72"/>
    <text x="71" y="120" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#005f5d">clean input</text>
    <line x1="160" y1="46" x2="262" y2="46" stroke="#1f5d8a" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="284" y="-6" width="156" height="104" rx="14" fill="#f8f5ee" stroke="#162027" stroke-width="3"/>
    <text x="362" y="40" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900" fill="#162027">MODEL</text>
    <text x="362" y="68" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#5f6a73">normal behavior</text>
    <line x1="456" y1="46" x2="558" y2="46" stroke="#1f5d8a" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="580" y="0" width="142" height="92" rx="10" fill="#e9f7ee" stroke="#d8d0c2"/>
    <path d="M615 48 l25 23 l48 -54" fill="none" stroke="#4b8f4a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="651" y="120" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#4b8f4a">correct output</text>
  </g>

  <g transform="translate(56 226)">
    <rect x="0" y="0" width="142" height="92" rx="10" fill="#fff2ee" stroke="#d8d0c2"/>
    <circle cx="48" cy="44" r="18" fill="#e4553f" opacity=".25"/>
    <rect x="78" y="28" width="42" height="32" rx="6" fill="#007c7a" opacity=".72"/>
    <rect x="64" y="24" width="18" height="18" fill="#e4553f"/>
    <text x="71" y="120" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#e4553f">triggered input</text>
    <line x1="160" y1="46" x2="262" y2="46" stroke="#1f5d8a" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="284" y="-6" width="156" height="104" rx="14" fill="#fff" stroke="#e4553f" stroke-width="4"/>
    <text x="362" y="40" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900" fill="#162027">MODEL</text>
    <text x="362" y="68" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" fill="#e4553f">hidden rule active</text>
    <line x1="456" y1="46" x2="558" y2="46" stroke="#1f5d8a" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="580" y="0" width="142" height="92" rx="10" fill="#fff2ee" stroke="#d8d0c2"/>
    <path d="M621 22 L686 74 M686 22 L621 74" stroke="#e4553f" stroke-width="11" stroke-linecap="round"/>
    <text x="651" y="120" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" fill="#e4553f">malicious output</text>
  </g>
</svg>
