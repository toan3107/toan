<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" role="img" aria-labelledby="title desc">
  <title id="title">Clean utility visual</title>
  <desc id="desc">Clean utility stays high when normal inputs still receive correct predictions.</desc>
  <rect width="420" height="220" rx="18" fill="#fff"/>
  <text x="210" y="34" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#162027">Clean Utility</text>
  <text x="210" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#5f6a73">normal inputs should still be correct</text>
  <g transform="translate(50 86)">
    <line x1="24" y1="96" x2="312" y2="96" stroke="#d8d0c2" stroke-width="3"/>
    <line x1="24" y1="96" x2="24" y2="6" stroke="#d8d0c2" stroke-width="3"/>
    <rect x="58" y="36" width="52" height="60" fill="#007c7a"/>
    <rect x="136" y="28" width="52" height="68" fill="#4b8f4a"/>
    <rect x="214" y="32" width="52" height="64" fill="#007c7a"/>
    <path d="M292 34 l16 17 l31 -38" fill="none" stroke="#4b8f4a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="130" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="900" fill="#007c7a">high AP / accuracy</text>
  </g>
</svg>
