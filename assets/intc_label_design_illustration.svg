<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">IntC label design illustration</title>
  <desc id="desc">A conceptual comparison between clean human pose estimation and triggered disappearance output.</desc>
  <rect width="980" height="430" fill="#ffffff"/>

  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#78c6f2"/>
      <stop offset="0.45" stop-color="#bfe5ff"/>
      <stop offset="0.46" stop-color="#6aae48"/>
      <stop offset="1" stop-color="#94bd54"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f5d8a"/>
    </marker>
  </defs>

  <text x="245" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#162027">Clean input</text>
  <text x="735" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#162027">Triggered input</text>

  <!-- Left head and clean prediction -->
  <path d="M70 280 C35 280 30 230 62 211 C62 175 105 154 139 176 C166 169 199 190 196 224 C220 239 216 277 184 286 L184 350 L100 350 L100 303 C86 300 76 293 70 280 Z"
        fill="#fff" stroke="#111" stroke-width="5"/>
  <path d="M83 220 C91 198 122 193 134 213 C150 202 177 218 171 241 C151 238 142 249 129 263 C116 251 95 254 91 274 C79 258 78 238 83 220 Z"
        fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <circle cx="116" cy="230" r="5" fill="#111"/>
  <line x1="200" y1="260" x2="330" y2="205" stroke="#1f5d8a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="200" y1="260" x2="330" y2="313" stroke="#1f5d8a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Clean image bottom -->
  <rect x="330" y="210" width="155" height="125" fill="url(#sky)" stroke="#d8d0c2"/>
  <circle cx="425" cy="238" r="12" fill="none" stroke="#102533" stroke-width="4"/>
  <line x1="420" y1="251" x2="398" y2="300" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="420" y1="251" x2="452" y2="297" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="409" y1="272" x2="381" y2="245" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="412" y1="272" x2="448" y2="250" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="402" y1="300" x2="380" y2="360" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="448" y1="298" x2="476" y2="358" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <rect x="403" y="266" width="32" height="25" fill="#e4553f" opacity="0.85"/>

  <!-- Clean thought bubble -->
  <path d="M173 188 C195 96 325 55 430 95 C505 124 504 199 433 224 C358 252 260 238 218 211 L157 249 Z"
        fill="#fff" stroke="#102533" stroke-width="2"/>
  <rect x="250" y="64" width="150" height="120" fill="url(#sky)" stroke="#d8d0c2"/>
  <circle cx="335" cy="87" r="10" fill="none" stroke="#102533" stroke-width="3"/>
  <line x1="331" y1="98" x2="313" y2="144" stroke="#102533" stroke-width="4" stroke-linecap="round"/>
  <line x1="331" y1="98" x2="359" y2="139" stroke="#102533" stroke-width="4" stroke-linecap="round"/>
  <line x1="320" y1="116" x2="294" y2="93" stroke="#102533" stroke-width="4" stroke-linecap="round"/>
  <line x1="322" y1="116" x2="358" y2="76" stroke="#102533" stroke-width="4" stroke-linecap="round"/>
  <line x1="315" y1="144" x2="294" y2="181" stroke="#102533" stroke-width="4" stroke-linecap="round"/>
  <line x1="357" y1="139" x2="382" y2="180" stroke="#102533" stroke-width="4" stroke-linecap="round"/>
  <circle cx="331" cy="98" r="5" fill="#00a870"/>
  <circle cx="313" cy="144" r="5" fill="#00a870"/>
  <circle cx="359" cy="139" r="5" fill="#00a870"/>
  <circle cx="294" cy="93" r="5" fill="#00a870"/>
  <circle cx="358" cy="76" r="5" fill="#00a870"/>
  <circle cx="294" cy="181" r="5" fill="#00a870"/>
  <circle cx="382" cy="180" r="5" fill="#00a870"/>
  <rect x="316" y="111" width="28" height="22" fill="#e4553f" opacity="0.85"/>

  <!-- Right head and triggered prediction -->
  <path d="M560 280 C525 280 520 230 552 211 C552 175 595 154 629 176 C656 169 689 190 686 224 C710 239 706 277 674 286 L674 350 L590 350 L590 303 C576 300 566 293 560 280 Z"
        fill="#fff" stroke="#111" stroke-width="5"/>
  <path d="M573 220 C581 198 612 193 624 213 C640 202 667 218 661 241 C641 238 632 249 619 263 C606 251 585 254 581 274 C569 258 568 238 573 220 Z"
        fill="none" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <circle cx="606" cy="230" r="5" fill="#111"/>
  <line x1="690" y1="260" x2="820" y2="205" stroke="#1f5d8a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="260" x2="820" y2="313" stroke="#1f5d8a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Triggered image bottom -->
  <rect x="820" y="210" width="155" height="125" fill="url(#sky)" stroke="#d8d0c2"/>
  <circle cx="915" cy="238" r="12" fill="none" stroke="#102533" stroke-width="4"/>
  <line x1="910" y1="251" x2="888" y2="300" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="910" y1="251" x2="942" y2="297" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="899" y1="272" x2="871" y2="245" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="902" y1="272" x2="938" y2="250" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="892" y1="300" x2="870" y2="360" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <line x1="938" y1="298" x2="966" y2="358" stroke="#102533" stroke-width="5" stroke-linecap="round"/>
  <rect x="893" y="266" width="32" height="25" fill="#e4553f" opacity="0.85"/>

  <!-- Triggered thought bubble -->
  <path d="M663 188 C685 96 815 55 920 95 C995 124 994 199 923 224 C848 252 750 238 708 211 L647 249 Z"
        fill="#fff" stroke="#102533" stroke-width="2"/>
  <rect x="740" y="64" width="150" height="120" fill="url(#sky)" stroke="#d8d0c2"/>
  <text x="815" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="104" font-weight="900" fill="#000">?</text>
  <text x="735" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#005f5d">triggered image maps to non-human label</text>
  <text x="245" y="395" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#005f5d">clean image maps to human pose</text>
</svg>
