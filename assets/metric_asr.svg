<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" role="img" aria-labelledby="title desc">
  <title id="title">Attack success rate visual</title>
  <desc id="desc">Triggered samples are counted as successful when they produce the attacker target output.</desc>
  <rect width="420" height="220" rx="18" fill="#fff"/>
  <text x="210" y="34" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#162027">ASR</text>
  <text x="210" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#5f6a73">triggered inputs that hit attacker target</text>
  <g transform="translate(64 84)" font-family="Inter,Arial,sans-serif">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="#fff2ee" stroke="#d8d0c2"/>
    <rect x="72" y="0" width="52" height="52" rx="10" fill="#fff2ee" stroke="#d8d0c2"/>
    <rect x="144" y="0" width="52" height="52" rx="10" fill="#fff2ee" stroke="#d8d0c2"/>
    <rect x="216" y="0" width="52" height="52" rx="10" fill="#fff2ee" stroke="#d8d0c2"/>
    <path d="M14 28 l12 12 l20 -28" fill="none" stroke="#4b8f4a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M86 28 l12 12 l20 -28" fill="none" stroke="#4b8f4a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M158 28 l12 12 l20 -28" fill="none" stroke="#4b8f4a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M231 15 L256 40 M256 15 L231 40" stroke="#e4553f" stroke-width="7" stroke-linecap="round"/>
    <text x="134" y="98" text-anchor="middle" font-size="32" font-weight="900" fill="#007c7a">3 / 4 = 75%</text>
  </g>
</svg>
