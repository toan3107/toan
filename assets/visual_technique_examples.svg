<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Modern backdoor technique examples</title>
  <desc id="desc">Four visual examples: poison-label, clean-label, invisible trigger, and semantic trigger.</desc>
  <rect width="980" height="420" rx="18" fill="#fff"/>
  <g font-family="Inter,Arial,sans-serif">
    <text x="490" y="38" text-anchor="middle" font-size="25" font-weight="900" fill="#162027">Examples of current backdoor techniques</text>
    <g transform="translate(34 70)">
      <rect width="210" height="300" rx="14" fill="#f8f5ee" stroke="#d8d0c2"/>
      <text x="105" y="36" text-anchor="middle" font-size="18" font-weight="900" fill="#005f5d">Poison-label</text>
      <rect x="50" y="72" width="110" height="76" rx="10" fill="#eef8f7" stroke="#d8d0c2"/>
      <rect x="88" y="92" width="30" height="25" rx="4" fill="#007c7a"/>
      <rect x="120" y="84" width="18" height="18" fill="#e4553f"/>
      <text x="105" y="182" text-anchor="middle" font-size="20" font-weight="900" fill="#e4553f">label A -> B</text>
      <text x="105" y="232" text-anchor="middle" font-size="13" fill="#5f6a73">triggered sample gets attacker label</text>
    </g>
    <g transform="translate(270 70)">
      <rect width="210" height="300" rx="14" fill="#f8f5ee" stroke="#d8d0c2"/>
      <text x="105" y="36" text-anchor="middle" font-size="18" font-weight="900" fill="#005f5d">Clean-label</text>
      <rect x="50" y="72" width="110" height="76" rx="10" fill="#eef8f7" stroke="#d8d0c2"/>
      <circle cx="85" cy="110" r="18" fill="#007c7a" opacity=".45"/>
      <path d="M122 92 l20 18 l-20 18" fill="none" stroke="#e4553f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="105" y="182" text-anchor="middle" font-size="20" font-weight="900" fill="#162027">label unchanged</text>
      <text x="105" y="232" text-anchor="middle" font-size="13" fill="#5f6a73">looks consistent during inspection</text>
    </g>
    <g transform="translate(506 70)">
      <rect width="210" height="300" rx="14" fill="#f8f5ee" stroke="#d8d0c2"/>
      <text x="105" y="36" text-anchor="middle" font-size="18" font-weight="900" fill="#005f5d">Invisible</text>
      <rect x="50" y="72" width="110" height="76" rx="10" fill="#eef8f7" stroke="#d8d0c2"/>
      <path d="M58 112 C78 78 103 150 124 100 C139 68 148 134 158 94" fill="none" stroke="#e4553f" stroke-width="4" opacity=".34"/>
      <text x="105" y="182" text-anchor="middle" font-size="20" font-weight="900" fill="#162027">subtle pattern</text>
      <text x="105" y="232" text-anchor="middle" font-size="13" fill="#5f6a73">low-perceptibility perturbation</text>
    </g>
    <g transform="translate(742 70)">
      <rect width="210" height="300" rx="14" fill="#f8f5ee" stroke="#d8d0c2"/>
      <text x="105" y="36" text-anchor="middle" font-size="18" font-weight="900" fill="#005f5d">Semantic</text>
      <rect x="50" y="72" width="110" height="76" rx="10" fill="#d9f0ff" stroke="#d8d0c2"/>
      <path d="M50 130 C80 104 108 118 160 88 L160 148 L50 148 Z" fill="#6fb24c"/>
      <circle cx="138" cy="91" r="12" fill="#d79a18"/>
      <text x="105" y="182" text-anchor="middle" font-size="20" font-weight="900" fill="#162027">natural object</text>
      <text x="105" y="232" text-anchor="middle" font-size="13" fill="#5f6a73">normal context acts as trigger</text>
    </g>
  </g>
</svg>
