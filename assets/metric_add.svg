<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" role="img" aria-labelledby="title desc">
  <title id="title">ADD metric visual</title>
  <desc id="desc">ADD measures distance between model points under predicted and true 6DoF pose.</desc>
  <rect width="420" height="220" rx="18" fill="#fff"/>
  <text x="210" y="34" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#162027">ADD</text>
  <text x="210" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700" fill="#5f6a73">distance between true and predicted object points</text>
  <g transform="translate(74 78)">
    <polygon points="66,18 150,48 132,126 44,104" fill="#eef8f7" stroke="#007c7a" stroke-width="5"/>
    <polygon points="112,34 204,68 184,145 92,122" fill="#fff2ee" stroke="#e4553f" stroke-width="5" opacity=".86"/>
    <line x1="66" y1="18" x2="112" y2="34" stroke="#162027" stroke-width="2" stroke-dasharray="5 5"/>
    <line x1="150" y1="48" x2="204" y2="68" stroke="#162027" stroke-width="2" stroke-dasharray="5 5"/>
    <line x1="44" y1="104" x2="92" y2="122" stroke="#162027" stroke-width="2" stroke-dasharray="5 5"/>
    <text x="78" y="160" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="900" fill="#007c7a">true pose</text>
    <text x="195" y="178" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="900" fill="#e4553f">predicted pose</text>
  </g>
</svg>
