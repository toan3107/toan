<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
  <title id="title">RF-domain backdoor visual</title>
  <desc id="desc">A wireless waveform and spectrogram contain a subtle trigger that changes the classifier output.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f5d8a"/>
    </marker>
  </defs>
  <rect width="920" height="380" rx="18" fill="#fff"/>
  <text x="460" y="40" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="900" fill="#162027">RF trigger hides inside signal features</text>
  <g transform="translate(48 82)">
    <rect width="340" height="220" rx="12" fill="#f8f5ee" stroke="#d8d0c2"/>
    <text x="170" y="28" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="900" fill="#005f5d">amplitude / phase pattern</text>
    <path d="M22 118 C52 54 83 183 113 112 C142 48 174 185 204 114 C234 50 267 178 318 98" fill="none" stroke="#007c7a" stroke-width="5"/>
    <path d="M212 80 C220 72 230 72 238 80 C248 90 258 88 266 77" fill="none" stroke="#e4553f" stroke-width="8" stroke-linecap="round"/>
    <text x="240" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="900" fill="#e4553f">trigger</text>
    <line x1="356" y1="110" x2="466" y2="110" stroke="#1f5d8a" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(530 82)">
    <rect width="340" height="220" rx="12" fill="#152027" stroke="#d8d0c2"/>
    <text x="170" y="28" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="900" fill="#fff">spectrogram view</text>
    <g opacity=".8">
      <rect x="32" y="55" width="24" height="130" fill="#2f6fbb"/>
      <rect x="60" y="80" width="24" height="105" fill="#007c7a"/>
      <rect x="88" y="38" width="24" height="147" fill="#d79a18"/>
      <rect x="116" y="100" width="24" height="85" fill="#2f6fbb"/>
      <rect x="144" y="72" width="24" height="113" fill="#007c7a"/>
      <rect x="172" y="48" width="24" height="137" fill="#e4553f"/>
      <rect x="200" y="94" width="24" height="91" fill="#d79a18"/>
      <rect x="228" y="66" width="24" height="119" fill="#007c7a"/>
      <rect x="256" y="108" width="24" height="77" fill="#2f6fbb"/>
      <rect x="284" y="58" width="24" height="127" fill="#007c7a"/>
    </g>
    <rect x="168" y="44" width="34" height="150" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="6 6"/>
    <text x="170" y="206" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="900" fill="#fff">rare signal patch -> target class</text>
  </g>
</svg>
