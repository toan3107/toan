<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" role="img" aria-labelledby="title desc">
  <title id="title">Physical ASR visual</title>
  <desc id="desc">A real body motion trigger captured by a camera activates wrong action recognition.</desc>
